<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home – My Pi Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

  <div id="site-header"></div>

  <!-- Page content starts here -->
  <div class="p-5 mb-4 bg-light rounded-3">
    <div class="container-fluid py-5">
      <h1 class="display-5 fw-bold">Welcome to My Site!</h1>
      <p class="fs-4">This website is fully self-hosted on my Raspberry Pi with custom HTML, CSS, and Bootstrap.</p>
      <a class="btn btn-primary btn-lg" href="/projects/">View My Projects</a>
    </div>
  </div>

  <!-- Page content ends here -->

  <div id="site-footer"></div>

  <script>
    fetch('/header.html').then(res => res.text()).then(data => {
      document.getElementById('site-header').innerHTML = data;
    });

    fetch('/footer.html').then(res => res.text()).then(data => {
      document.getElementById('site-footer').innerHTML = data;
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
